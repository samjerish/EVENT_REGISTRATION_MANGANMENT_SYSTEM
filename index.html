<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindkraft Registration Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        [hidden] { display: none !important; }

        input, select {
            transition: all 0.2s ease;
        }
        
        input:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="selection:bg-blue-500/30">

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
    </div>

    <!-- Login View -->
    <div id="login-view" class="relative z-10 h-screen flex items-center justify-center p-6">
        <div class="glass p-8 md:p-12 w-full max-w-md rounded-[48px] shadow-2xl relative border border-white/10">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold tracking-tight mb-2 text-white">MINDKRAFT</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest opacity-70">Secured Admin Portal</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div id="login-error" class="hidden bg-rose-500/10 border border-rose-500/20 px-4 py-3 rounded-2xl flex items-center gap-3 text-rose-400 text-[11px] font-bold uppercase tracking-wider">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i> Access details are incorrect
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 ml-3 flex items-center gap-2">
                        <i data-lucide="user" class="w-3 h-3"></i> Username
                    </label>
                    <input type="text" id="username" required placeholder="Enter username" class="w-full bg-slate-950/40 border border-white/5 px-5 py-3.5 rounded-2xl text-sm focus:border-blue-500/50 outline-none text-white placeholder:text-slate-700">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 ml-3 flex items-center gap-2">
                        <i data-lucide="lock" class="w-3 h-3"></i> Password
                    </label>
                    <input type="password" id="password" required placeholder="Enter password" class="w-full bg-slate-950/40 border border-white/5 px-5 py-3.5 rounded-2xl text-sm focus:border-blue-500/50 outline-none text-white placeholder:text-slate-700">
                </div>

                <button type="submit" class="group w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl text-[11px] uppercase tracking-wider transition-all mt-4 shadow-xl shadow-blue-600/20 flex items-center justify-center gap-3">
                    Verify & Login <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Main App View -->
    <div id="app-view" class="hidden h-screen flex flex-col z-10 relative">
        <!-- Header -->
        <header class="flex-none px-6 lg:px-12 py-6 border-b border-white/5 bg-slate-950/80 backdrop-blur-md">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <div class="flex items-center gap-4">
                        <h1 class="text-3xl font-bold tracking-tighter text-white">MINDKRAFT</h1>
                        <div class="flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide bg-blue-500/10 text-blue-400 border border-blue-500/20">
                            <i data-lucide="activity" class="w-2.5 h-2.5 animate-pulse"></i> Offline Mode Active
                        </div>
                    </div>
                    <div class="flex items-center gap-3 text-slate-500 text-[10px] font-medium uppercase tracking-wider mt-1">
                        <span id="user-display"></span>
                        <button id="logout-btn" class="text-rose-500/70 hover:text-rose-400 transition-colors underline">Logout</button>
                    </div>
                </div>
                
                <nav class="flex p-1 bg-slate-900/40 border border-white/10 rounded-2xl" id="nav-tabs">
                    <button id="tab-entry" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 bg-blue-600 text-white">
                        <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> New Student
                    </button>
                    <button id="tab-list" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 text-slate-500 hover:text-slate-200">
                        <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> View Ledger
                    </button>
                </nav>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="max-w-7xl mx-auto p-6 lg:p-12">
                
                <!-- Entry Section -->
                <section id="entry-section" class="max-w-2xl mx-auto">
                    <div class="glass p-8 md:p-12 rounded-[40px] shadow-2xl">
                        <div class="mb-10 text-center">
                            <h3 class="text-2xl font-bold text-white uppercase tracking-tight mb-2">Student Registration</h3>
                            <p class="text-slate-500 text-[10px] font-medium uppercase tracking-widest opacity-60">Local Database & Email Notification Active</p>
                        </div>

                        <form id="registration-form" class="space-y-8">
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-4">Student Name</label>
                                <div class="relative">
                                    <i data-lucide="user" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 w-4.5 h-4.5"></i>
                                    <input name="name" type="text" required placeholder="Full name of student" class="w-full bg-slate-950/50 border border-white/5 px-14 py-4 rounded-2xl text-sm focus:border-blue-500/50 outline-none text-white placeholder:text-slate-800">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-4">Receipt Number</label>
                                    <div class="relative">
                                        <i data-lucide="hash" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 w-4.5 h-4.5"></i>
                                        <input name="recipeNo" type="text" required placeholder="Receipt ID" class="w-full bg-slate-950/50 border border-white/5 px-14 py-4 rounded-2xl text-sm focus:border-blue-500/50 outline-none text-white placeholder:text-slate-800">
                                    </div>
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-4">College Name</label>
                                    <div class="relative">
                                        <i data-lucide="school" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 w-4.5 h-4.5"></i>
                                        <input name="college" list="colleges-list" type="text" required placeholder="Select college" class="w-full bg-slate-950/50 border border-white/5 px-14 py-4 rounded-2xl text-sm focus:border-blue-500/50 outline-none text-white placeholder:text-slate-800">
                                        <datalist id="colleges-list"></datalist>
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-4">Payment Status</label>
                                    <div class="relative">
                                        <i data-lucide="credit-card" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 w-4.5 h-4.5"></i>
                                        <select name="status" class="w-full bg-slate-950/50 border border-white/5 px-14 py-4 rounded-2xl text-sm focus:border-blue-500/50 outline-none appearance-none cursor-pointer text-white">
                                            <option value="Paid">Paid</option>
                                            <option value="Pending">Pending</option>
                                        </select>
                                        <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-700 w-4 h-4 pointer-events-none"></i>
                                    </div>
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-4">Eduserve Account</label>
                                    <div class="relative">
                                        <i data-lucide="zap" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-600 w-4.5 h-4.5"></i>
                                        <select name="eduserve" class="w-full bg-slate-950/50 border border-white/5 px-14 py-4 rounded-2xl text-sm focus:border-blue-500/50 outline-none appearance-none cursor-pointer text-white">
                                            <option value="Yes">Yes</option>
                                            <option value="No">No</option>
                                        </select>
                                        <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-700 w-4 h-4 pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl text-[11px] uppercase tracking-wider flex items-center justify-center gap-3 transition-all shadow-xl active:scale-[0.98]">
                                <i data-lucide="send" class="w-4.5 h-4.5"></i>
                                <span>Save & Notify</span>
                            </button>
                        </form>
                    </div>
                </section>

                <!-- List Section -->
                <section id="list-section" class="hidden space-y-8 animate-in fade-in duration-500">
                    <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-6 bg-slate-900/20 p-6 rounded-3xl border border-white/5">
                        <div class="flex items-center gap-6">
                            <h3 class="text-2xl font-bold text-white uppercase tracking-tight">Records</h3>
                            <span id="record-count" class="text-[10px] font-bold uppercase text-blue-400 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/10">0 Total</span>
                        </div>
                        
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex bg-slate-950/40 p-1.5 rounded-2xl border border-white/5">
                                <button id="filter-all" class="px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-slate-500 hover:text-slate-300">
                                    All
                                </button>
                                <button id="filter-paid" class="px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-600/20">
                                    Paid
                                </button>
                                <button id="filter-pending" class="px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-slate-500 hover:text-slate-300">
                                    Pending
                                </button>
                            </div>

                            <button id="export-btn" class="bg-white/5 hover:bg-white/10 text-white px-6 py-3.5 rounded-2xl text-[10px] font-bold uppercase tracking-wider flex items-center gap-3 transition-all border border-white/10">
                                <i data-lucide="download" class="text-blue-500 w-4 h-4"></i> Export Excel
                            </button>
                        </div>
                    </div>

                    <div id="records-grid" class="grid grid-cols-1 gap-4">
                        <!-- Content generated via JS -->
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 px-8 py-4 rounded-2xl shadow-2xl border backdrop-blur-xl z-[200] animate-in slide-in-from-bottom-8">
        <div id="toast-dot" class="w-2 h-2 rounded-full animate-pulse"></div>
        <span id="toast-msg" class="font-bold text-[11px] uppercase tracking-wider"></span>
    </div>

    <script>
      const scriptURL =                       
      "https://script.google.com/macros/s/AKfycbyWNFDjyS2-TfQPuLYwaXvSazGhGn9Wvv19bTELkOeCBPTxvROZaDdlcq5orYcqCfQKvQ/exec";
      const form = document.forms["submit-to-google-sheet"];
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        var formData = new FormData(form);
        var ex = document.getElementById("ex").checked;
        var age = document.getElementById("age").checked;

        if (age) {
          formData.append("age", "Yes");
        } else {
          formData.append("age", "No");
        }
        if (ex) {
          formData.append("ex", "Yes");
        } else {
          formData.append("ex", "No");
        }

        fetch(scriptURL, { method: "POST", body: formData })
          .then((response) => {
            swal("Done", "Submitted Successfully.", "success");
          })
          .catch((error) => {
            swal("Error", "Something went wrong. please try again!", "error");
          });
      });
    </script>
  </body>
</html>
    <script>
        // --- Configuration ---
        const FORMSPREE_URL = "https://formspree.io/f/mwvwpzzg";
        const COLLEGES = [
            "Amrita Vishwa Vidyapeetham, Coimbatore", "Amrita Vishwa Vidyapeetham", "Coimbatore Institute of Technology",
            "Hindusthan College of Engineering and Technology", "Karunya Institute of Technology and Sciences",
            "PSG College of Technology", "SNS College of Engineering", "SNS College of Technology",
            "SRM Institute of Science and Technology", "SSN College of Engineering", "Vellore Institute of Technology",
            "Loyola College Chennai", "PSG College of Arts and Science"
        ];

        // --- State Management ---
        let appUser = null; 
        let records = JSON.parse(localStorage.getItem('mindkraft_records') || '[]');
        let activeFilter = 'Paid'; // Default view

        // --- Utils ---
        const showToast = (msg, type = 'success') => {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastDot = document.getElementById('toast-dot');
            
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 px-8 py-4 rounded-2xl shadow-2xl border backdrop-blur-xl z-[200] animate-in slide-in-from-bottom-8 ${type === 'error' ? 'bg-rose-950/90 border-rose-500/30 text-rose-200' : 'bg-blue-950/90 border-blue-500/30 text-blue-200'}`;
            toastDot.className = `w-2 h-2 rounded-full animate-pulse ${type === 'error' ? 'bg-rose-500' : 'bg-blue-500'}`;
            toastMsg.innerText = msg;
            toast.classList.remove('hidden');
            
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const formatTime = (isoString) => {
            if (!isoString) return 'Now';
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        };

        const handleLogout = () => {
            appUser = null;
            document.getElementById('app-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('login-form').reset();
            showToast("Logged out");
        };

        const deleteRecord = (id) => {
            if (confirm("Are you sure you want to delete this record? This cannot be undone.")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('mindkraft_records', JSON.stringify(records));
                renderRecords();
                showToast("Record Deleted", "error");
            }
        };

        // --- Lifecycle ---
        const init = () => {
            // Populate Colleges
            const dl = document.getElementById('colleges-list');
            COLLEGES.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                dl.appendChild(opt);
            });
            
            lucide.createIcons();
            renderRecords();
        };

        const renderRecords = () => {
            const grid = document.getElementById('records-grid');
            const filtered = activeFilter === 'All' ? records : records.filter(r => r.status === activeFilter);

            document.getElementById('record-count').innerText = `${records.length} Registered`;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="py-24 text-center border-2 border-dashed border-white/5 rounded-[40px] glass">
                        <i data-lucide="database" class="w-12 h-12 text-slate-800 mx-auto mb-4"></i>
                        <p class="text-slate-500 font-bold text-[10px] uppercase tracking-widest">No ${activeFilter} Records Found</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = filtered.map((r, idx) => `
                <div class="group bg-slate-900/30 p-6 rounded-[32px] border border-white/5 flex flex-col md:flex-row md:items-center justify-between gap-6 transition-all hover:bg-slate-900/50">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center font-bold bg-slate-950/80 border border-white/5 text-slate-500 text-[11px]">
                           ${idx + 1}
                        </div>
                        <div>
                            <h4 class="text-xl font-bold text-white tracking-tight">${r.name}</h4>
                            <div class="flex flex-wrap items-center gap-x-6 text-[10px] font-bold uppercase text-slate-500 mt-2">
                                <span class="flex items-center gap-2"><i data-lucide="hash" class="w-3.5 h-3.5 text-blue-500"></i> ${r.recipeNo}</span>
                                <span class="flex items-center gap-2"><i data-lucide="school" class="w-3.5 h-3.5 text-indigo-500"></i> ${r.college}</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between md:justify-end gap-10">
                        <div class="text-right">
                             <p class="text-[9px] font-bold uppercase tracking-widest text-slate-600 mb-1.5">Payment Status</p>
                             <span class="text-[10px] font-black uppercase px-4 py-1.5 rounded-full ${r.status === 'Paid' ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-400 bg-rose-500/10 border border-rose-500/20'}">${r.status}</span>
                        </div>
                        <div class="text-right">
                             <p class="text-[9px] font-bold uppercase tracking-widest text-slate-600 mb-1.5">Registered At</p>
                             <span class="text-[10px] font-bold text-slate-400 uppercase">${formatTime(r.createdAt)}</span>
                        </div>
                        <button onclick="deleteRecord('${r.id}')" class="p-3 rounded-2xl bg-rose-500/10 text-rose-500 border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">
                             <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // --- Interaction Handlers ---
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const un = document.getElementById('username').value.trim().toLowerCase();
            const pw = document.getElementById('password').value.trim();
            
            if ((un === 'samjerish' && pw === 'password') || (un === 'shemaiah' && pw === 'Rs@123')) {
                appUser = { username: un, role: 'admin' };
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('user-display').innerText = `Admin: ${un}`;
                showToast("Identity Verified");
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                showToast("Access Denied", "error");
            }
        };

        document.getElementById('registration-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = btn.querySelector('span');
            btn.disabled = true;
            btnText.innerText = "Processing...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                // Local Save Logic
                const newRecord = {
                    ...data,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                    registeredBy: appUser.username
                };
                
                records.unshift(newRecord);
                localStorage.setItem('mindkraft_records', JSON.stringify(records));

                // Notification via Formspree
                await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                showToast("Student Registered Locally");
                e.target.reset();
                renderRecords();
            } catch (err) {
                showToast("Notification Failed (Saved Locally)", "error");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Save & Notify";
            }
        };

        document.getElementById('logout-btn').onclick = handleLogout;

        // Navigation
        document.getElementById('tab-entry').onclick = () => {
            document.getElementById('tab-entry').className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 bg-blue-600 text-white shadow-lg shadow-blue-600/20";
            document.getElementById('tab-list').className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 text-slate-500 hover:text-slate-200";
            document.getElementById('entry-section').classList.remove('hidden');
            document.getElementById('list-section').classList.add('hidden');
        };

        document.getElementById('tab-list').onclick = () => {
            document.getElementById('tab-list').className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 bg-blue-600 text-white shadow-lg shadow-blue-600/20";
            document.getElementById('tab-entry').className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all flex items-center gap-2 text-slate-500 hover:text-slate-200";
            document.getElementById('list-section').classList.remove('hidden');
            document.getElementById('entry-section').classList.add('hidden');
            renderRecords();
        };

        // Filter Logic
        const resetFilterBtns = () => {
            ['filter-all', 'filter-paid', 'filter-pending'].forEach(id => {
                document.getElementById(id).className = "px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-slate-500 hover:text-slate-300";
            });
        };

        document.getElementById('filter-all').onclick = () => {
            activeFilter = 'All';
            resetFilterBtns();
            document.getElementById('filter-all').className = "px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-blue-600 text-white shadow-lg shadow-blue-600/20";
            renderRecords();
        };

        document.getElementById('filter-paid').onclick = () => {
            activeFilter = 'Paid';
            resetFilterBtns();
            document.getElementById('filter-paid').className = "px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-600/20";
            renderRecords();
        };

        document.getElementById('filter-pending').onclick = () => {
            activeFilter = 'Pending';
            resetFilterBtns();
            document.getElementById('filter-pending').className = "px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-rose-600 text-white shadow-lg shadow-rose-600/20";
            renderRecords();
        };

        document.getElementById('export-btn').onclick = () => {
            if (records.length === 0) return showToast("No records to export", "error");
            const exportData = records.map(r => ({
                Name: r.name, Receipt: r.recipeNo, College: r.college, Status: r.status, Eduserve: r.eduserve
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Mindkraft_Data");
            XLSX.writeFile(wb, "Mindkraft_Registrations.xlsx");
            showToast("Excel Export Complete");
        };

        window.onload = init;
    </script>
</body>
</html>
